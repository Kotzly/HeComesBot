<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tree Editor</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
<div id="app">

  <!-- Left: build settings -->
  <div id="build-panel">
    <h2>Build</h2>

    <label>Seed
      <div class="input-row">
        <input type="number" id="seed-input" value="42">
        <button id="random-seed-btn" title="Random seed">&#x1F3B2;</button>
      </div>
    </label>

    <label>Width  <input type="number" id="width-input"     value="256"></label>
    <label>Height <input type="number" id="height-input"    value="256"></label>
    <label>Min depth <input type="number" id="min-depth-input" value="6"></label>
    <label>Max depth <input type="number" id="max-depth-input" value="16"></label>

    <label>Personality
      <select id="personality-select"></select>
    </label>

    <label>Color space
      <select id="color-space-select">
        <option value="rgb">RGB</option>
        <option value="hsv">HSV</option>
        <option value="cmy">CMY</option>
      </select>
    </label>

    <button id="build-btn" class="primary-btn">Build Tree</button>

    <hr>

    <h2>Save / Load</h2>
    <label>Name <input type="text" id="save-name-input" placeholder="my_tree"></label>
    <button id="save-btn" class="secondary-btn" disabled>Save</button>

    <label>Saved trees
      <div class="input-row">
        <select id="load-select" style="flex:1"></select>
        <button id="refresh-trees-btn" title="Refresh list">&#x21BB;</button>
      </div>
    </label>
    <button id="load-btn" class="secondary-btn">Load</button>

    <hr>

    <h2>Preview</h2>
    <button id="preview-btn" class="secondary-btn" disabled>Render Frame</button>
    <div id="preview-wrap" style="display:none">
      <img id="preview-img" alt="Preview" title="Click to enlarge">
    </div>

    <hr>

    <div id="legend"></div>


    <div id="tree-stats"></div>
  </div>

  <!-- Center: tree -->
  <div id="tree-container">
    <div id="tree-toolbar">
      <label id="auto-update-label">
        <input type="checkbox" id="auto-update-chk"> Auto-update
      </label>
      <button id="undo-btn" class="secondary-btn" disabled>Undo</button>
      <button id="flatten-btn" class="danger-btn">Flatten to Color</button>
      <button id="set-reference-btn" class="secondary-btn">Set Reference</button>
      <button id="clear-reference-btn" class="secondary-btn">Clear Reference</button>
      <span id="reference-toolbar" class="hidden muted">Ref: <span id="reference-id-display" class="mono"></span></span>
      <div id="prune-toolbar-group">
        <span class="toolbar-label">Prune:</span>
        <select id="prune-method-select"></select>
        <label class="toolbar-label">δ <input type="number" id="prune-delta"     value="0.05" step="0.01" min="0"></label>
        <label class="toolbar-label">τ <input type="number" id="prune-threshold" value="0.1"  step="0.01" min="0"></label>
        <button id="sensitivity-btn"      class="secondary-btn">Sensitivity</button>
        <button id="clear-sensitivity-btn" class="secondary-btn">Clear</button>
        <button id="prune-btn"            class="danger-btn">Prune</button>
        <span id="prune-result" class="muted"></span>
      </div>
    </div>
    <svg id="tree-svg"></svg>
    <div id="tree-hint">Build a tree to visualize it.<br>
      <small>Click node to edit &nbsp;·&nbsp; Double-click to collapse</small>
    </div>
  </div>

  <!-- Right: node editor -->
  <div id="node-panel" class="hidden">
    <h2>Node</h2>

    <div id="node-preview-wrap">
      <div id="node-preview-loading" class="muted" style="display:none">Rendering…</div>
      <img id="node-preview-img" alt="" title="Click to enlarge" style="display:none">
    </div>
    <div class="field-row"><span class="label">ID</span>    <span id="node-id-display"   class="mono"></span></div>
    <div class="field-row"><span class="label">Function</span><span id="node-func-display" class="mono"></span></div>
    <div class="field-row"><span class="label">Arity</span>  <span id="node-arity-display"></span></div>

    <hr>
    <h3>Change Function</h3>
    <select id="func-select"></select>
    <button id="apply-func-btn" class="primary-btn">Apply</button>

    <hr>
    <h3>Regenerate Subtree</h3>
    <label>Seed
      <div class="input-row">
        <input type="number" id="regen-seed-input" value="0">
        <button id="regen-random-btn" title="Random seed">&#x1F3B2;</button>
      </div>
    </label>
    <button id="regen-btn" class="danger-btn">Regenerate</button>

    <!-- Non-leaf param editor (shown for nodes with editable params) -->
    <div id="node-params-editor" class="hidden">
      <hr>
      <h3>Parameters</h3>
      <div id="node-params-controls"></div>
    </div>

    <!-- Leaf editor (shown only for arity-0 nodes) -->
    <div id="leaf-editor" class="hidden">
      <hr>
      <h3>Leaf Values</h3>
      <div id="leaf-controls"></div>

      <button id="update-leaf-btn" class="primary-btn">Update Leaf</button>
    </div>
  </div>

</div>

<!-- Enlarged preview modal -->
<div id="preview-modal" class="modal hidden">
  <div class="modal-content">
    <button class="modal-close" id="modal-close-btn">&#x2715;</button>
    <img id="modal-img" alt="Preview">
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
